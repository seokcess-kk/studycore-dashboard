<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>스터디코어1.0 관리자</title>
  <meta name="theme-color" content="#103050" />
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" sizes="180x180" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="admin">
  <div class="admin-wrap">
    <header class="admin-top">
      <div>
        <h1>관리자</h1>
      </div>
      <a class="btn-ghost" href="index.html">리포트 화면</a>
    </header>

    <!-- 세션 확인 중 (서버 모드) -->
    <section id="admin-checking" class="auth-card" hidden>
      <p class="auth-sub" style="margin:0;text-align:center">로그인 확인 중…</p>
    </section>

    <!-- 원장 로그인 게이트 (서버 모드에서만) -->
    <section id="admin-auth" class="auth-card" hidden>
      <h2>관리자 로그인</h2>
      <p class="auth-sub">계정 확인 후 데이터를 관리할 수 있습니다.</p>
      <form id="auth-form" autocomplete="on">
        <label><span>이메일</span><input type="email" id="auth-email" required /></label>
        <label><span>비밀번호</span><input type="password" id="auth-pw" required /></label>
        <button type="submit" class="btn-primary" id="auth-btn">로그인</button>
        <p id="auth-error" class="login-error" hidden></p>
      </form>
    </section>

    <div id="admin-main">
    <!-- 학생 리포트 검색·미리보기 -->
    <section class="report-search-card">
      <h2>학생 리포트 보기</h2>
      <p class="rs-sub">이름을 검색해 학부모에게 보이는 리포트를 새 탭에서 확인합니다.</p>
      <input type="search" id="report-search" class="report-search-input"
             placeholder="학생 이름 검색" autocomplete="off" />
      <div id="report-results" class="report-results"></div>
    </section>
    <!-- 엑셀 업로드 -->
    <section class="upload-card">
      <h2>출결 엑셀 업로드</h2>
      <div class="upload-drop" id="upload-drop">
        <input type="file" id="file-input" accept=".xlsx,.xls" hidden />
        <div class="drop-inner">
          <div class="drop-icon">📁</div>
          <button class="btn-primary" id="btn-pick" type="button">파일 선택</button>
          <div class="drop-hint">.xlsx 파일을 끌어다 놓을 수도 있습니다</div>
          <div class="upload-fname" id="upload-fname"></div>
        </div>
      </div>
      <div id="upload-msg" class="upload-msg" hidden></div>
      <div id="upload-preview" class="upload-preview" hidden></div>
      <div class="loaded-info" id="loaded-info"></div>
    </section>

    <!-- 학생 명부(연락처·프로필) 업로드 -->
    <section class="upload-card">
      <h2>학생 명부 업로드</h2>
      <div class="upload-drop" id="roster-drop">
        <input type="file" id="roster-input" accept=".xlsx,.xls" hidden />
        <div class="drop-inner">
          <div class="drop-icon">📇</div>
          <button class="btn-primary" id="roster-pick" type="button">파일 선택</button>
          <div class="drop-hint">.xlsx 파일을 끌어다 놓을 수도 있습니다</div>
          <div class="upload-fname" id="roster-fname"></div>
        </div>
      </div>
      <div id="roster-msg" class="upload-msg" hidden></div>
      <div id="roster-preview" class="upload-preview" hidden></div>
    </section>

    <h2 class="section-h">퇴실 미체크 확인</h2>
    <div class="admin-stats" id="admin-stats"></div>

    <div class="admin-toolbar">
      <input type="search" id="admin-search" class="admin-search" placeholder="학생 이름 검색" />
      <div class="admin-toolbar-right">
        <select id="admin-sort" title="정렬">
          <option value="name">이름순</option>
          <option value="prov">임시 시간 긴 순</option>
          <option value="todo">확인 필요 많은 순</option>
          <option value="recent">최근 날짜순</option>
        </select>
        <select id="filter-month"></select>
      </div>
    </div>

    <div id="flag-list" class="flag-list"></div>
    </div><!-- /#admin-main -->
  </div>

  <!-- 보정 입력 모달 -->
  <div id="corr-modal" class="modal" hidden>
    <div class="modal-backdrop" data-close="1"></div>
    <div class="modal-card">
      <button class="modal-close" data-close="1">✕</button>
      <div id="corr-target" class="corr-target"></div>

      <p class="corr-guide">입장, 외출, 재입장, 퇴장 기록을 그대로 붙여넣으면 순공부시간을 계산합니다.</p>
      <textarea id="corr-input" rows="9" placeholder="예)
입장        19:59:46
외출 (외출)  20:20:47
재입장       20:26:30
외출 (외출)  22:02:11
재입장       22:09:16
외출 (외출)  22:49:27
재입장       22:55:14
외출 (외출)  23:51:10
퇴장(강제퇴장) 0:55:05"></textarea>

      <div class="corr-actions">
        <button class="btn-primary" id="btn-calc">계산</button>
        <button class="btn-ghost" id="btn-clear" hidden>저장값 삭제</button>
      </div>

      <div id="corr-result" class="corr-result" hidden></div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="vendor/supabase.min.js"></script>
  <script src="scapi.js"></script>
  <script src="data.js"></script>
  <script src="dataset.js"></script>
  <script src="aggregate.js"></script>
  <script src="vendor/xlsx.full.min.js"></script>
  <script src="ingest.js"></script>
  <script src="roster.js"></script>
  <script src="preview.js"></script>
  <script src="datacache.js"></script>
  <script src="corrections.js"></script>
  <script src="admin.js"></script>
</body>
</html>
