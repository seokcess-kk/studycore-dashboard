<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>스터디코어 학습 리포트 | 자녀의 한 달 공부 기록</title>
  <meta name="description" content="스터디코어 학습 리포트 — 자녀의 월간 순공부시간·출결·반 평균을 한눈에 확인하세요." />
  <meta name="theme-color" content="#103050" />

  <!-- Open Graph / Twitter -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="스터디코어 학습 리포트" />
  <meta property="og:title" content="스터디코어 학습 리포트 | 자녀의 한 달 공부 기록" />
  <meta property="og:description" content="월간 순공부시간 · 출결 달력 · 반 평균 비교를 한눈에." />
  <meta property="og:url" content="https://report.studycore.kr" />
  <meta property="og:image" content="https://report.studycore.kr/og.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="스터디코어 학습 리포트" />
  <meta property="og:locale" content="ko_KR" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="스터디코어 학습 리포트 | 자녀의 한 달 공부 기록" />
  <meta name="twitter:description" content="월간 순공부시간 · 출결 달력 · 반 평균 비교를 한눈에." />
  <meta name="twitter:image" content="https://report.studycore.kr/og.png" />

  <!-- 파비콘 / 아이콘 -->
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" href="icon-192x192.png" sizes="192x192" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" sizes="180x180" />

  <!-- 본사와 동일한 폰트 (Noto Serif/Sans KR + IBM Plex Mono) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ===== 로그인 ===== -->
  <section id="view-login" class="view active">
    <div class="login-card">
      <div class="brand">
        <div class="brand-mark"><img src="icon-512x512.png" alt="스터디코어" /></div>
        <h1>스터디코어 학습 리포트</h1>
        <p class="brand-sub">이번 달 학습 기록을 확인해 보세요</p>
      </div>
      <form id="login-form" autocomplete="off">
        <label>
          <span>학생 이름</span>
          <input type="text" id="in-name" placeholder="예) 정훈" required />
        </label>
        <label>
          <span>휴대폰 번호 뒷 4자리</span>
          <input type="tel" id="in-phone" inputmode="numeric" maxlength="4"
                 pattern="[0-9]{4}" placeholder="예) 9402" required />
        </label>
        <button type="submit" class="btn-primary">리포트 보기</button>
        <p id="login-error" class="login-error" hidden></p>
      </form>
      <details class="demo-box" id="demo-box" hidden>
        <summary>데모 계정</summary>
        <p class="demo-hint">선택하면 입력란에 자동으로 채워집니다.</p>
        <div id="demo-list" class="demo-list"></div>
        <p class="demo-hint" style="margin-top:10px"><a href="admin.html">관리자 화면으로 이동</a></p>
      </details>
      <p class="admin-entry"><a href="admin.html">관리자 로그인</a></p>
    </div>
  </section>

  <!-- ===== 월 달력 ===== -->
  <section id="view-calendar" class="view">
    <header class="topbar">
      <div class="topbar-left">
        <div class="student-name" id="cal-student"></div>
        <div class="student-meta" id="cal-meta"></div>
      </div>
      <button class="btn-ghost" id="btn-logout">로그아웃</button>
    </header>

    <div class="month-nav" id="month-nav">
      <button class="nav-arrow" id="prev-month" aria-label="이전 달">‹</button>
      <h2 id="cal-month-title"></h2>
      <button class="nav-arrow" id="next-month" aria-label="다음 달">›</button>
    </div>

    <div id="data-status" class="data-status" hidden></div>

    <div class="summary-grid" id="summary-grid"></div>

    <div class="cal-legend" id="cal-legend">
      <span><i class="dot dot-study"></i> 학습 기록</span>
      <span><i class="dot dot-nocheck"></i> 확인 필요</span>
      <span><i class="dot dot-absent"></i> 결석</span>
      <span><i class="chip-weekend">주말</i></span>
    </div>

    <div class="calendar" id="calendar"></div>

    <div class="class-compare" id="class-compare"></div>

    <button class="btn-primary wide" id="btn-monthly">월간 리포트 자세히 보기</button>
  </section>

  <!-- ===== 월간 상세 ===== -->
  <section id="view-monthly" class="view">
    <header class="topbar">
      <button class="btn-ghost" id="btn-back-cal">‹ 월간 달력</button>
      <div class="topbar-title" id="monthly-title"></div>
      <span></span>
    </header>
    <div id="monthly-body" class="monthly-body"></div>
  </section>

  <!-- ===== 일자 상세 (모달) ===== -->
  <div id="day-modal" class="modal" hidden>
    <div class="modal-backdrop" data-close="1"></div>
    <div class="modal-card" role="dialog" aria-modal="true">
      <button class="modal-close" data-close="1" aria-label="닫기">✕</button>
      <div id="day-modal-body"></div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="vendor/supabase.min.js"></script>
  <script src="scapi.js"></script>
  <script src="data.js"></script>
  <script src="dataset.js"></script>
  <script src="aggregate.js"></script>
  <script src="corrections.js"></script>
  <script src="app.js"></script>
</body>
</html>
